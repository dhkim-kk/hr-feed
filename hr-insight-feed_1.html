<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR 인사이트 피드 · CatchTable HR</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Pretendard', sans-serif; background: #f9f9f7; color: #1a1a1a; min-height: 100vh; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 0 24px 48px; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 2rem 0 1.25rem; border-bottom: 1px solid #e5e5e0; margin-bottom: 1.5rem; gap: 12px; flex-wrap: wrap; }
  .top-bar-left h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
  .top-bar-left p { font-size: 13px; color: #888; margin-top: 4px; }
  .badge { display: inline-block; background: #FF3A2F; color: #fff; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 999px; margin-left: 8px; vertical-align: middle; }
  .top-right { display: flex; align-items: center; gap: 8px; }
  .lock-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid #e0e0e0; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
  .lock-btn:hover { background: #f5f5f3; }
  .admin-actions { display: none; align-items: center; gap: 8px; }
  .admin-actions.show { display: flex; }
  .btn-icon { display: flex; align-items: center; gap: 6px; padding: 7px 13px; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #555; cursor: pointer; font-size: 13px; font-family: inherit; text-decoration: none; transition: background 0.15s; }
  .btn-icon:hover { background: #f5f5f3; }
  .btn-sheet { color: #1d7d3a; }
  .btn-sheet:hover { background: #f0faf3; }
  .btn-lock-off { color: #c00; font-size: 12px; border-color: #fcd0d0; }
  .btn-lock-off:hover { background: #fff3f3; }
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100; align-items: center; justify-content: center; }
  .modal-bg.show { display: flex; }
  .modal { background: #fff; border-radius: 14px; padding: 1.75rem; width: 320px; }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .modal p { font-size: 13px; color: #888; margin-bottom: 16px; }
  .modal input { width: 100%; padding: 9px 12px; font-size: 14px; border-radius: 8px; border: 1px solid #ddd; font-family: inherit; outline: none; margin-bottom: 10px; }
  .modal input:focus { border-color: #999; }
  .modal-error { font-size: 12px; color: #c00; margin-bottom: 10px; min-height: 16px; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-cancel { padding: 8px 14px; border-radius: 8px; border: 1px solid #ddd; background: #fff; font-size: 13px; cursor: pointer; font-family: inherit; }
  .btn-confirm { padding: 8px 14px; border-radius: 8px; border: none; background: #1a1a1a; color: #fff; font-size: 13px; cursor: pointer; font-family: inherit; }
  .search-wrap { margin-bottom: 1rem; }
  .search-wrap input { width: 100%; padding: 10px 14px; font-size: 14px; border-radius: 10px; border: 1px solid #ddd; background: #fff; color: #1a1a1a; font-family: inherit; outline: none; transition: border-color 0.15s; }
  .search-wrap input:focus { border-color: #999; }
  .search-wrap input::placeholder { color: #bbb; }
  .cats { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .cat-btn { padding: 6px 14px; border-radius: 999px; border: 1px solid #ddd; background: #fff; color: #666; cursor: pointer; font-size: 13px; transition: all 0.15s; font-family: inherit; }
  .cat-btn:hover { border-color: #999; color: #1a1a1a; }
  .cat-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .status-bar { font-size: 12px; color: #aaa; margin-bottom: 12px; min-height: 18px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
  .card { background: #fff; border: 1px solid #ebebeb; border-radius: 14px; padding: 1.1rem 1.25rem; display: flex; flex-direction: column; gap: 9px; transition: box-shadow 0.15s, border-color 0.15s; }
  .card:hover { border-color: #ccc; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .card-meta { display: flex; align-items: center; justify-content: space-between; }
  .cat-tag { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px; }
  .tag-채용    { background: #E6F1FB; color: #185FA5; }
  .tag-조직문화 { background: #EAF3DE; color: #3B6D11; }
  .tag-HR테크  { background: #EEEDFE; color: #534AB7; }
  .tag-리더십  { background: #FAEEDA; color: #854F0B; }
  .tag-트렌드  { background: #FAECE7; color: #993C1D; }
  .tag-기타   { background: #f0f0ee; color: #666; }
  .card-date { font-size: 11px; color: #aaa; }
  .card-title { font-size: 14px; font-weight: 600; line-height: 1.55; color: #1a1a1a; }
  .card-source { font-size: 12px; color: #bbb; }
  .card-summary { font-size: 13px; color: #555; line-height: 1.65; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .card-summary.expanded { -webkit-line-clamp: unset; overflow: visible; }
  .card-actions { display: flex; gap: 8px; margin-top: 4px; }
  .btn-s { font-size: 12px; padding: 5px 11px; border-radius: 8px; border: 1px solid #e0e0e0; background: #fff; color: #666; cursor: pointer; text-decoration: none; transition: background 0.12s; font-family: inherit; }
  .btn-s:hover { background: #f5f5f3; }
  .skel { background: #fff; border: 1px solid #ebebeb; border-radius: 14px; padding: 1.1rem 1.25rem; display: flex; flex-direction: column; gap: 9px; }
  .skel-line { height: 12px; border-radius: 4px; background: #f0f0ee; animation: pulse 1.4s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
  .state-box { grid-column: 1/-1; text-align: center; padding: 3rem 0; }
  .state-box p { font-size: 14px; color: #aaa; }
  .error-box { background: #fff3f3; border: 1px solid #fcd0d0; border-radius: 10px; padding: 14px 18px; font-size: 13px; color: #c00; margin-bottom: 1rem; }
  .spin { display: inline-block; animation: spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  footer { margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid #ebebeb; font-size: 12px; color: #ccc; text-align: center; }
</style>
</head>
<body>
<div class="wrap">

  <div class="top-bar">
    <div class="top-bar-left">
      <h1>HR 인사이트 피드 <span class="badge">CATCHTABLE HR</span></h1>
      <p id="lastUpdated">불러오는 중...</p>
    </div>
    <div class="top-right">
      <div class="admin-actions" id="adminActions">
        <button class="btn-icon" id="refreshBtn" onclick="loadSheet()">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="width:13px;height:13px"><path d="M13.5 8A5.5 5.5 0 1 1 8 2.5" stroke-linecap="round"/><polyline points="11,1 14,4 11,7" stroke-linecap="round" stroke-linejoin="round"/></svg>
          새로고침
        </button>
        <a class="btn-icon btn-sheet" id="btnSheet" href="https://docs.google.com/spreadsheets/d/e/2PACX-1vSANdceIQ5EqZg4fPSlypDwu_yqOrfFTtbK8bwNMiLEptyRXdOjnYu3QED6TnkqmmUwMfBfw6o0tdg7/pub?gid=661983695&single=true&output=csv" target="_blank">
          <svg viewBox="0 0 16 16" fill="none" stroke="#1d7d3a" stroke-width="1.5" style="width:13px;height:13px"><rect x="2" y="2" width="12" height="12" rx="2"/><line x1="2" y1="6" x2="14" y2="6"/><line x1="6" y1="6" x2="6" y2="14"/></svg>
          시트 편집
        </a>
        <button class="btn-icon btn-lock-off" onclick="lockAdmin()">🔒 잠금</button>
      </div>
      <button class="lock-btn" id="lockBtn" onclick="openModal()" title="관리자">
        <svg viewBox="0 0 16 16" fill="none" stroke="#bbb" stroke-width="1.5" style="width:14px;height:14px">
          <rect x="3" y="7" width="10" height="8" rx="2"/>
          <path d="M5 7V5a3 3 0 0 1 6 0v2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="modal-bg" id="modalBg" onclick="closeModalBg(event)">
    <div class="modal">
      <h2>관리자 확인</h2>
      <p>비밀번호를 입력하면 관리 버튼이 활성화돼요</p>
      <input type="password" id="pwInput" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')checkPw()" />
      <div class="modal-error" id="pwError"></div>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">취소</button>
        <button class="btn-confirm" onclick="checkPw()">확인</button>
      </div>
    </div>
  </div>

  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="키워드로 검색 (예: 성과관리, 온보딩, OKR...)" oninput="render()" />
  </div>

  <div class="cats">
    <button class="cat-btn active" data-cat="전체" onclick="filterCat(this)">전체</button>
    <button class="cat-btn" data-cat="채용" onclick="filterCat(this)">채용</button>
    <button class="cat-btn" data-cat="조직문화" onclick="filterCat(this)">조직문화</button>
    <button class="cat-btn" data-cat="HR테크" onclick="filterCat(this)">HR테크</button>
    <button class="cat-btn" data-cat="리더십" onclick="filterCat(this)">리더십</button>
    <button class="cat-btn" data-cat="트렌드" onclick="filterCat(this)">트렌드</button>
  </div>

  <div id="errorBox"></div>
  <div class="status-bar" id="statusBar"></div>
  <div class="grid" id="grid">
    <div class="state-box"><p>불러오는 중...</p></div>
  </div>

  <footer>CatchTable HR Team · 매일 아침 자동 업데이트</footer>
</div>

<script>
const ADMIN_PASSWORD = 'catchtable2026';
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSANdceIQ5EqZg4fPSlypDwu_yqOrfFTtbK8bwNMiLEptyRXdOjnYu3QED6TnkqmmUwMfBfw6o0tdg7/pub?gid=661983695&single=true&output=csv';

let articles = [];
let currentCat = '전체';

function openModal() {
  document.getElementById('pwInput').value = '';
  document.getElementById('pwError').textContent = '';
  document.getElementById('modalBg').classList.add('show');
  setTimeout(() => document.getElementById('pwInput').focus(), 100);
}
function closeModal() { document.getElementById('modalBg').classList.remove('show'); }
function closeModalBg(e) { if (e.target === document.getElementById('modalBg')) closeModal(); }
function checkPw() {
  if (document.getElementById('pwInput').value === ADMIN_PASSWORD) {
    document.getElementById('adminActions').classList.add('show');
    document.getElementById('lockBtn').style.display = 'none';
    closeModal();
  } else {
    document.getElementById('pwError').textContent = '비밀번호가 틀렸습니다';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}
function lockAdmin() {
  document.getElementById('adminActions').classList.remove('show');
  document.getElementById('lockBtn').style.display = '';
}

async function loadSheet() {
  const btn = document.getElementById('refreshBtn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spin">↻</span> 불러오는 중...'; }
  document.getElementById('errorBox').innerHTML = '';
  showSkels();

  try {
    const res = await fetch(CSV_URL + '&t=' + Date.now());
    if (!res.ok) throw new Error('시트 접근 실패 (' + res.status + ')');
    const text = await res.text();
    const parsed = parseCSV(text);
    if (!parsed.length) throw new Error('데이터가 없습니다');
    articles = parsed;
    const now = new Date();
    document.getElementById('lastUpdated').textContent = '업데이트: ' + now.toLocaleString('ko-KR', {month:'long', day:'numeric', hour:'2-digit', minute:'2-digit'});
    render();
  } catch(e) {
    document.getElementById('errorBox').innerHTML = '<div class="error-box">⚠️ ' + e.message + '</div>';
    document.getElementById('grid').innerHTML = '<div class="state-box"><p>불러오기 실패</p></div>';
    document.getElementById('statusBar').textContent = '';
    document.getElementById('lastUpdated').textContent = '—';
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="width:13px;height:13px"><path d="M13.5 8A5.5 5.5 0 1 1 8 2.5" stroke-linecap="round"/><polyline points="11,1 14,4 11,7" stroke-linecap="round" stroke-linejoin="round"/></svg> 새로고침'; }
  }
}

function parseCSV(csv) {
  const rows = csv.trim().split('\n');
  if (rows.length < 2) return [];
  const hdrs = splitLine(rows[0]).map(h => h.toLowerCase().trim());
  const gi = k => hdrs.indexOf(k);
  return rows.slice(1).map(r => {
    const c = splitLine(r);
    const g = k => (c[gi(k)] || '').trim();
    return { title: g('title'), summary: g('summary'), source: g('source'), date: g('date'), category: g('category') || '기타', url: g('url') };
  }).filter(a => a.title);
}
function splitLine(line) {
  const r = []; let cur = '', q = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { q = !q; continue; }
    if (c === ',' && !q) { r.push(cur); cur = ''; continue; }
    cur += c;
  }
  r.push(cur); return r;
}

function filterCat(btn) {
  currentCat = btn.dataset.cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function tagCls(c) {
  return ({'채용':'tag-채용','조직문화':'tag-조직문화','HR테크':'tag-HR테크','리더십':'tag-리더십','트렌드':'tag-트렌드'})[c] || 'tag-기타';
}
function render() {
  const kw = (document.getElementById('searchInput').value || '').toLowerCase();
  let list = currentCat === '전체' ? articles : articles.filter(a => a.category === currentCat);
  if (kw) list = list.filter(a => (a.title + a.summary + a.source).toLowerCase().includes(kw));
  list = list.sort((a, b) => {
  const parse = d => {
    if (!d) return 0;
    const m = d.match(/(\d{4}).*?(\d{1,2}).*?(\d{1,2})/);
    return m ? new Date(m[1], m[2]-1, m[3]) : 0;
  };
  return parse(b.date) - parse(a.date);
});
  document.getElementById('statusBar').textContent = list.length + '개 아티클';
  if (!list.length) { document.getElementById('grid').innerHTML = '<div class="state-box"><p>해당 조건의 기사가 없습니다</p></div>'; return; }
  document.getElementById('grid').innerHTML = list.map((a, i) => `
    <div class="card">
      <div class="card-meta">
        <span class="cat-tag ${tagCls(a.category)}">${a.category}</span>
        <span class="card-date">${a.date}</span>
      </div>
      <div class="card-title">${a.title}</div>
      <div class="card-source">${a.source}</div>
      <div class="card-summary" id="s${i}">${a.summary}</div>
      <div class="card-actions">
        <button class="btn-s" onclick="tog(${i})">더 보기</button>
        ${a.url ? '<a class="btn-s" href="' + a.url + '" target="_blank">원문 ↗</a>' : ''}
      </div>
    </div>`).join('');
}
function tog(i) {
  const el = document.getElementById('s' + i);
  const b = el.nextElementSibling.querySelector('.btn-s');
  if (el.classList.toggle('expanded')) b.textContent = '접기'; else b.textContent = '더 보기';
}
function showSkels() {
  document.getElementById('grid').innerHTML = Array(6).fill(0).map(() => `
    <div class="skel">
      <div style="display:flex;justify-content:space-between"><div class="skel-line" style="width:55px"></div><div class="skel-line" style="width:45px;animation-delay:.1s"></div></div>
      <div class="skel-line" style="width:92%;animation-delay:.05s"></div>
      <div class="skel-line" style="width:70%;animation-delay:.1s"></div>
      <div class="skel-line" style="width:40px;animation-delay:.12s"></div>
      <div class="skel-line" style="width:100%;animation-delay:.08s"></div>
      <div class="skel-line" style="width:85%;animation-delay:.13s"></div>
      <div class="skel-line" style="width:60%;animation-delay:.18s"></div>
    </div>`).join('');
}

loadSheet();
</script>
</body>
</html>
